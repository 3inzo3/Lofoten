<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lofoten žygių žemėlapis</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; background:#0b1020; color:#e5e7eb;
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  #map { position:fixed; top:0; left:0; right:0; bottom:96px; }
  .bar { position:fixed; left:0; right:0; bottom:0; height:96px; background:#111a33;
          padding:10px 16px; box-sizing:border-box; z-index:1000; }
  .bar .lbl { font-size:15px; margin-bottom:6px; display:flex;
               justify-content:space-between; align-items:center; }
  .bar input { width:100%; }
  .back { color:#93c5fd; text-decoration:none; font-size:14px; }
  .mk { width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
        justify-content:center; font-weight:700; font-size:14px; color:#0b1020;
        border:2px solid #0b1020; box-shadow:0 1px 4px rgba(0,0,0,.6); }
</style>
</head>
<body>
<div id="map"></div>
<div class="bar">
  <div class="lbl"><b id="tlabel"></b><a class="back" href="index.html">← sąrašas</a></div>
  <input id="slider" type="range" min="0" value="0" step="1">
</div>
<script>
const D = {"times": ["Šiandien 13:00", "Šiandien 14:00", "Šiandien 15:00", "Šiandien 16:00", "Šiandien 17:00", "Šiandien 18:00", "Šiandien 19:00", "Šiandien 20:00", "Šiandien 21:00", "Šiandien 22:00", "Šiandien 23:00", "Rytoj 00:00", "Rytoj 01:00", "Rytoj 02:00", "Rytoj 03:00", "Rytoj 04:00", "Rytoj 05:00"], "hikes": [{"n": "Festvågtinden", "e": 541, "la": 68.1717, "lo": 14.2208, "s": [1, 0, 0, 1, 1, 0, 0, 0, 0, 2, 2, 3, 3, 7, 0, 2, 4]}, {"n": "Fløya", "e": 590, "la": 68.2449, "lo": 14.5776, "s": [0, 0, 1, 5, 5, 3, 0, 0, 0, 0, 2, 4, 4, 7, 8, 4, 5]}, {"n": "Volandstinden", "e": 457, "la": 68.0709, "lo": 13.2139, "s": [8, 6, 3, 5, 6, 4, 0, 0, 4, 0, 0, 0, 0, 0, 0, 0, 0]}, {"n": "Ryten", "e": 543, "la": 68.0855, "lo": 13.1426, "s": [2, 1, 3, 5, 6, 4, 0, 0, 4, 0, 0, 0, 0, 0, 0, 0, 0]}, {"n": "Reinebringen", "e": 448, "la": 67.9223, "lo": 13.0784, "s": [8, 7, 3, 5, 6, 4, 0, 0, 3, 0, 0, 0, 0, 0, 0, 0, 0]}, {"n": "Mannen", "e": 400, "la": 68.202, "lo": 13.52, "s": [0, 8, 0, 0, 0, 0, 4, 0, 3, 0, 0, 0, 0, 0, 0, 2, 4]}, {"n": "Himmeltindan", "e": 962, "la": 68.168, "lo": 13.47, "s": [1, 3, 1, 0, 0, 0, 0, 0, 0, 4, 0, 0, 0, 0, 0, 0, 2]}, {"n": "Justadtinden", "e": 738, "la": 68.196, "lo": 13.87, "s": [0, 1, 3, 0, 0, 0, 0, 0, 0, 3, 3, 0, 0, 0, 0, 2, 4]}, {"n": "Nonstinden", "e": 457, "la": 68.08, "lo": 13.56, "s": [7, 8, 7, 0, 0, 0, 0, 1, 0, 5, 0, 0, 0, 0, 0, 2, 4]}, {"n": "Stornappstinden", "e": 740, "la": 68.08, "lo": 13.415, "s": [2, 2, 1, 0, 4, 4, 0, 0, 0, 2, 0, 0, 0, 0, 0, 0, 3]}, {"n": "Nubben", "e": 380, "la": 68.097, "lo": 13.264, "s": [8, 7, 16, 14, 14, 13, 9, 6, 6, 2, 0, 0, 0, 0, 0, 0, 0]}, {"n": "Hermannsdalstinden", "e": 1029, "la": 67.93, "lo": 12.928, "s": [3, 1, 3, 5, 6, 4, 0, 0, 2, 0, 0, 0, 0, 0, 0, 0, 0]}, {"n": "Helvetestinden", "e": 602, "la": 67.975, "lo": 12.935, "s": [2, 2, 3, 5, 6, 4, 0, 0, 2, 0, 0, 0, 0, 0, 0, 0, 0]}, {"n": "Hoven", "e": 368, "la": 68.33, "lo": 14.12, "s": [0, 0, 7, 7, 4, 5, 6, 6, 6, 2, 0, 0, 0, 0, 0, 2, 4]}, {"n": "Tjeldbergtinden", "e": 367, "la": 68.222, "lo": 14.512, "s": [0, 0, 0, 18, 18, 10, 8, 6, 6, 6, 7, 3, 2, 0, 2, 4, 5]}]};
const map = L.map('map', {zoomControl:false}).setView([68.12, 13.8], 8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {attribution:'© OpenStreetMap', maxZoom:15}).addTo(map);
function color(s) {
  if (s === null) return '#475569';
  if (s >= 80) return '#22c55e';
  if (s >= 60) return '#86efac';
  if (s >= 50) return '#fde047';
  if (s >= 40) return '#f59e0b';
  return '#ef4444';
}
const markers = D.hikes.map(h => {
  const m = L.marker([h.la, h.lo], {icon: L.divIcon({className:'', iconSize:[36,36]})}).addTo(map);
  m.bindPopup('');
  return m;
});
const slider = document.getElementById('slider');
slider.max = D.times.length - 1;
function render(i) {
  document.getElementById('tlabel').textContent = D.times[i];
  D.hikes.forEach((h, j) => {
    const s = h.s[i];
    markers[j].setIcon(L.divIcon({className:'', iconSize:[36,36],
      html:`<div class="mk" style="background:${color(s)}">${s === null ? '–' : s}</div>`}));
    markers[j].setPopupContent(`<b>${h.n}</b><br>${h.e} m · score ${s === null ? 'nėra duomenų' : s}<br>${D.times[i]}`);
  });
}
slider.addEventListener('input', () => render(+slider.value));
render(0);
</script>
</body>
</html>
